<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء مهمة جديدة | لوحة المهام</title>
    <!-- خط جميل من Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #f3f6fa 0%, #e9eef4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .task-card {
            background-color: #ffffff;
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            border-radius: 36px;
            box-shadow: 0 20px 40px -8px rgba(0, 20, 40, 0.15), 0 8px 16px -6px rgba(0, 0, 0, 0.05);
            padding: 2.2rem 2.5rem;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
        }

        @media (max-width: 500px) {
            body {
                padding: 0.75rem;
            }

            .task-card {
                padding: 1.8rem 1.5rem;
                border-radius: 28px;
            }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2.2rem;
            border-bottom: 2px dashed #d0dae8;
            padding-bottom: 1.2rem;
        }

        .header-icon {
            background: #1e3a8a;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 6px 12px -2px rgba(30, 58, 138, 0.25);
        }

        .header-text h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #0b1e3a;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .header-text p {
            color: #5e718d;
            font-weight: 500;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 1rem;
            color: #1f3a5f;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            color: #3a6ea5;
            width: 20px;
            font-size: 1.1rem;
        }

        .required-star {
            color: #d43f3f;
            margin-right: 4px;
            font-size: 1.1rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px 18px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            border: 2px solid #dfe7f0;
            border-radius: 20px;
            background-color: #fafcff;
            transition: all 0.2s;
            color: #1e293b;
            font-weight: 500;
            resize: vertical;
        }

        textarea {
            min-height: 110px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #1e3a8a;
            background-color: #ffffff;
            box-shadow: 0 0 0 5px rgba(30, 58, 138, 0.08);
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 480px) {
            .row-2col {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%233a6ea5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: left 18px center;
            background-size: 18px;
            cursor: pointer;
        }

        .priority-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 8px;
        }

        .priority-high {
            background: #fee2e2;
            color: #b91c1c;
        }

        .priority-medium {
            background: #fef9c3;
            color: #92400e;
        }

        .priority-low {
            background: #dcfce7;
            color: #166534;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f2f6fc;
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid #dae3ed;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #1e3a8a;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: none;
            margin: 0;
            flex-shrink: 0;
        }

        .checkbox-wrapper label {
            margin: 0;
            font-weight: 600;
            color: #1f3a5f;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            margin-top: 2.8rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1 1 180px;
            padding: 16px 20px;
            border-radius: 48px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 14px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: #1e3a8a;
            color: white;
            border: 1px solid #2e4a9a;
        }

        .btn-primary:hover {
            background: #15316b;
            transform: translateY(-3px);
            box-shadow: 0 16px 22px -8px rgba(30, 58, 138, 0.35);
        }

        .btn-secondary {
            background: #ffffff;
            color: #1e3a8a;
            border: 2px solid #cbd6e6;
            box-shadow: 0 4px 8px -4px rgba(0, 0, 0, 0.04);
        }

        .btn-secondary:hover {
            background: #f4f9ff;
            border-color: #1e3a8a;
            transform: translateY(-2px);
        }

        .task-preview {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e2eaf3;
            font-size: 0.9rem;
            color: #4d627c;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preview-badge {
            background: #e7edf8;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        .fa-chevron-left {
            font-size: 0.9rem;
        }

        /* إخفاء السهم الافتراضي للتاريخ في بعض المتصفحات */
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.5;
            padding: 4px;
            cursor: pointer;
        }

        .error-msg {
            color: #c2410c;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background: #e6f7e6;
            border-radius: 24px;
            padding: 14px 20px;
            color: #1e7a44;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border: 1px solid #b3dfb3;
            display: none;
        }

        .show-success {
            display: flex;
        }

        a{
            width: 100%;
            padding: 14px 18px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            border: 2px solid #dfe7f0;
            border-radius: 20px;
            background-color: #fafcff;
            transition: all 0.2s;
            color: #1e293b;
            font-weight: 500;
            resize: vertical;
            display: block;
            margin-top: 5px;
            text-decoration: none;
            text-align:center;
            
        }
    </style>
</head>

<body>

    <div class="task-card">

        <!-- رسالة نجاح ديناميكية -->
        <div id="successBox" class="success-message">
            <i class="fas fa-check-circle" style="font-size: 1.5rem;"></i>
            <span>✅ تم إنشاء المهمة بنجاح! يمكنك البدء الآن.</span>
        </div>

        <div class="header">
            <div class="header-icon">
                <i class="fas fa-pen-to-square"></i>
            </div>
            <div class="header-text">
                <h1>إنشاء مهمة</h1>
                <p>أضف تفاصيل مهمتك الجديدة</p>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="حفظ" style='margin-top:20px;'>
        </form>
        <a href="{% url 'display' %}" class="back" >رجوع</a>
